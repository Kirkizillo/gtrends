name: Google Trends Monitor

on:
  # 5 grupos × 2 ejecuciones/día = 10 runs diarios
  # Separación de ~2h25min entre runs para evitar solapamientos
  # Cada grupo tarda ~40 min (3 términos × 4 regiones × 200s)
  schedule:
    - cron: '0 0,12 * * *'    # group_1: WW, IN, US, BR
    - cron: '25 2,14 * * *'   # group_2: ID, MX, PH, GB
    - cron: '50 4,16 * * *'   # group_3: AU, VN, DE, RU
    - cron: '15 7,19 * * *'   # group_4: TH, FR, IT, CO
    - cron: '40 9,21 * * *'   # group_5: JP, TR, RO, NG
    # digest: 07:00 UTC ~= 9h Madrid (CEST) / 8h Madrid (CET, +-1h estacional
    # inevitable con cron fijo). Consolida el día UTC ANTERIOR completo.
    - cron: '0 7 * * *'       # digest: consolidado diario (día anterior)

  # Permitir ejecución manual desde GitHub
  workflow_dispatch:
    inputs:
      group:
        description: 'Country group to run (or digest)'
        required: false
        default: 'group_1'
        type: choice
        options:
          - 'group_1'
          - 'group_2'
          - 'group_3'
          - 'group_4'
          - 'group_5'
          - 'digest'

# Permisos necesarios para crear issues y commitear reports/ + README
permissions:
  contents: write
  issues: write

jobs:
  # Determinar qué grupo ejecutar basado en github.event.schedule
  determine-group:
    runs-on: ubuntu-latest
    outputs:
      group: ${{ steps.set-group.outputs.group }}
    steps:
      - name: Determine group from schedule
        id: set-group
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "group=${{ github.event.inputs.group }}" >> $GITHUB_OUTPUT
          else
            CRON="${{ github.event.schedule }}"
            case "$CRON" in
              "0 0,12 * * *")    echo "group=group_1" >> $GITHUB_OUTPUT ;;
              "25 2,14 * * *")   echo "group=group_2" >> $GITHUB_OUTPUT ;;
              "50 4,16 * * *")   echo "group=group_3" >> $GITHUB_OUTPUT ;;
              "15 7,19 * * *")   echo "group=group_4" >> $GITHUB_OUTPUT ;;
              "40 9,21 * * *")   echo "group=group_5" >> $GITHUB_OUTPUT ;;
              "0 7 * * *")       echo "group=digest"   >> $GITHUB_OUTPUT ;;
              *)
                echo "::error::Unknown schedule trigger: '$CRON'"
                exit 1
                ;;
            esac
          fi

  scrape-and-export:
    needs: determine-group
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create credentials file
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          echo "$GOOGLE_CREDENTIALS" > credentials.json

      - name: Create .env file
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          PROXIES: ${{ secrets.PROXIES }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: |
          echo "GOOGLE_SHEET_ID=$GOOGLE_SHEET_ID" > .env
          echo "GOOGLE_CREDENTIALS_PATH=credentials.json" >> .env
          echo "PROXIES=$PROXIES" >> .env
          echo "TURSO_DATABASE_URL=$TURSO_DATABASE_URL" >> .env
          echo "TURSO_AUTH_TOKEN=$TURSO_AUTH_TOKEN" >> .env

      - name: Run Google Trends Monitor
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          GROUP="${{ needs.determine-group.outputs.group }}"
          if [ "$GROUP" = "digest" ]; then
            python digest.py
          elif [ -n "$GROUP" ]; then
            python main.py --group $GROUP
          else
            python main.py
          fi
        timeout-minutes: 90

      # Commit del estado del README (neutro, sin datos de negocio) +
      # country_tiers.json. Este repo es PÚBLICO: reports/ (el digest
      # completo con nombres de apps) NUNCA se commitea aquí — ver el
      # step "Push digest to private archive" más abajo.
      # El commit diario sigue actuando como keepalive: evita que GitHub
      # desactive el workflow tras 60 días sin actividad.
      - name: Commit digest reports
        if: success() && needs.determine-group.outputs.group == 'digest'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md country_tiers.json
          git diff --cached --quiet || (git commit -m "chore(digest): status update $(date -u +%F) [skip ci]" && git pull --rebase origin main && git push)

      # Archiva el digest completo (con nombres de apps) en el repo PRIVADO
      # gemelo Kirkizillo/gtrends-archive-private — nunca en este repo
      # público. Requiere el secret PRIVATE_ARCHIVE_TOKEN (fine-grained PAT
      # con permiso Contents:write limitado a ese repo). Si el secret aún
      # no existe, el step degrada limpio (avisa y no falla el job) —
      # ver TODO.md para los pasos de creación del token.
      - name: Push digest to private archive
        if: success() && needs.determine-group.outputs.group == 'digest'
        env:
          PRIVATE_ARCHIVE_TOKEN: ${{ secrets.PRIVATE_ARCHIVE_TOKEN }}
          PRIVATE_ARCHIVE_REPO: Kirkizillo/gtrends-archive-private
        run: |
          if [ -z "$PRIVATE_ARCHIVE_TOKEN" ]; then
            echo "::warning::PRIVATE_ARCHIVE_TOKEN no configurado — se omite el archivo privado. Ver TODO.md."
            exit 0
          fi
          TODAY=$(date -u +%F)
          rm -rf /tmp/private-archive
          git clone --depth 1 "https://x-access-token:${PRIVATE_ARCHIVE_TOKEN}@github.com/${PRIVATE_ARCHIVE_REPO}.git" /tmp/private-archive
          mkdir -p /tmp/private-archive/reports
          cp "reports/digest_${TODAY}.md" /tmp/private-archive/reports/ 2>/dev/null || echo "Sin digest_${TODAY}.md que copiar"
          cp reports/latest.md /tmp/private-archive/reports/ 2>/dev/null || true
          cd /tmp/private-archive
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/
          git diff --cached --quiet || (git commit -m "digest ${TODAY}" && git push)

      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_number }}-${{ needs.determine-group.outputs.group || 'all' }}
          path: logs/
          retention-days: 7

      - name: Notify on failure (Slack)
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"Google Trends Monitor failed! Group: ${{ needs.determine-group.outputs.group || 'all' }} - Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            $SLACK_WEBHOOK_URL

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Scraping failed - ${new Date().toISOString().split('T')[0]}`;
            const body = `## Scraping Failed\n\n- **Group:** ${{ needs.determine-group.outputs.group || 'all' }}\n- **Run:** [View logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\n- **Time:** ${new Date().toISOString()}\n\nPlease check the logs for more details.`;

            // Check if similar issue exists in last 24h
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'scraping-failure',
              per_page: 5
            });

            const recentIssue = issues.data.find(i => {
              const created = new Date(i.created_at);
              const now = new Date();
              return (now - created) < 24 * 60 * 60 * 1000;
            });

            if (!recentIssue) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['scraping-failure', 'automated']
              });
            }

      - name: Close resolved issues on success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'scraping-failure'
            });

            for (const issue of issues.data) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'completed'
              });
              console.log(`Closed issue #${issue.number}: ${issue.title}`);
            }
